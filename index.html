<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#12121f">
  <title>Halabuda</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cabinet.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

  <!-- ═══ Screen: Шкафы ═══════════════════════════════════════════════════════ -->
  <div id="screen-cabinets" class="screen active">
    <div class="cabinet-tabs">
      <button class="cab-tab active" data-cabinet="0">Основной шкаф</button>
      <button class="cab-tab"        data-cabinet="1">Кухня</button>
    </div>
    <div id="cabinet-view" class="cabinet-view"></div>
  </div>

  <!-- ═══ Screen: Поиск ═══════════════════════════════════════════════════════ -->
  <div id="screen-search" class="screen">
    <div class="screen-header">
      <h2>Поиск</h2>
      <button id="new-item-btn" class="btn-secondary" style="padding:8px 14px;font-size:14px">+ Новая позиция</button>
    </div>
    <div class="search-container">
      <input id="search-input" type="search" class="search-input" placeholder="Название товара...">
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- ═══ Screen: Отчёт ═══════════════════════════════════════════════════════ -->
  <div id="screen-report" class="screen">
    <div class="screen-header"><h2>Отчёт по остаткам</h2></div>
    <div id="report-content" class="list-content"></div>
  </div>

  <!-- ═══ Screen: История ═════════════════════════════════════════════════════ -->
  <div id="screen-history" class="screen">
    <div class="screen-header"><h2>История операций</h2></div>
    <div id="history-list" class="list-content"></div>
  </div>

  <!-- ═══ Screen: Ещё ══════════════════════════════════════════════════════════ -->
  <div id="screen-more" class="screen">
    <div class="screen-header"><h2>Ещё</h2></div>
    <div class="more-menu">
      <button class="more-item" onclick="Inventory.open()">📋 Инвентаризация</button>
      <button class="more-item" onclick="Settings.open()">⚙️ Настройки ящиков</button>
    </div>
    <div style="position:absolute;bottom:calc(var(--nav-h) + 12px);left:0;right:0;text-align:center;color:var(--text-dim);font-size:12px">
      Halabuda v<span id="app-version"></span>
    </div>
  </div>

  <!-- ═══ Drawer bottom sheet ══════════════════════════════════════════════════ -->
  <div id="drawer-overlay" class="overlay hidden"></div>
  <div id="drawer-modal"   class="bottom-sheet hidden">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span id="drawer-label" class="drawer-label-big"></span>
      <span id="drawer-name"  class="drawer-name-big"></span>
      <button id="drawer-close" class="btn-icon">✕</button>
    </div>
    <div id="drawer-items" class="drawer-items-list"></div>
    <div class="sheet-footer">
      <button id="add-item-btn" class="btn-primary">+ Добавить позицию</button>
    </div>
  </div>

  <!-- ═══ Edit item dialog ════════════════════════════════════════════════════ -->
  <div id="item-modal" class="dialog hidden">
    <div class="dialog-content">
      <h3 id="item-modal-title">Изменить позицию</h3>
      <div id="item-modal-name" style="font-size:15px;color:var(--text-dim);margin-bottom:14px"></div>
      <div class="form-group">
        <label>Количество</label>
        <input id="item-qty-input" type="number" min="0" value="0">
      </div>
      <div class="form-group">
        <label>Мин. остаток (0 = без контроля)</label>
        <input id="item-min-input" type="number" min="0" value="0">
      </div>
      <div class="form-group">
        <label>Коэффициент предупреждения</label>
        <input id="item-coef-input" type="number" min="1" step="0.1" value="1.5">
      </div>
      <div class="dialog-buttons">
        <button id="item-cancel-btn" class="btn-secondary">Отмена</button>
        <button id="item-save-btn"   class="btn-primary">Сохранить</button>
      </div>
      <button id="item-delete-btn" class="hidden"
        style="margin-top:12px;width:100%;background:none;border:1px solid var(--red);
               border-radius:var(--radius-sm);color:var(--red);font-size:14px;
               padding:10px;cursor:pointer;">
        🗑 Удалить из ящика
      </button>
    </div>
  </div>

  <!-- ═══ Bottom Navigation ════════════════════════════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-screen="cabinets">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Шкафы</span>
    </button>
    <button class="nav-item" data-screen="search">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Поиск</span>
    </button>
    <button class="nav-item" data-screen="report">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Отчёт</span>
    </button>
    <button class="nav-item" data-screen="history">
      <span class="nav-icon">📋</span>
      <span class="nav-label">История</span>
    </button>
    <button class="nav-item" data-screen="more">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Ещё</span>
    </button>
  </nav>

  <!-- ═══ Scripts ══════════════════════════════════════════════════════════════ -->
  <script src="lib/dexie.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cabinet.js"></script>
  <script src="js/drawer.js"></script>
  <script src="js/history.js"></script>
  <script src="js/search.js"></script>
  <script src="js/report.js"></script>
  <script src="js/more.js"></script>

</body>
</html>
